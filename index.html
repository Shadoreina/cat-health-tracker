<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Здоровье кота 🐾</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #070d14; color: #e2e8f0; font-family: Georgia, 'Times New Roman', serif; min-height: 100vh; padding-bottom: 40px; }
button { font-family: inherit; }
.header { background: linear-gradient(135deg, #0f2027 0%, #0a1628 50%, #070d14 100%); border-bottom: 1px solid #1e3a5f; padding: 24px 16px 16px; position: relative; overflow: hidden; }
.header-glow { position: absolute; top: -40px; right: -40px; width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(96,165,250,0.07) 0%, transparent 70%); pointer-events: none; }
.header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
.header-title { font-size: 20px; font-weight: bold; letter-spacing: 1px; color: #f0f9ff; }
.header-sub { font-size: 11px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; }
.edit-btn { border-radius: 99px; font-size: 11px; padding: 4px 10px; cursor: pointer; display: flex; align-items: center; gap: 5px; border: 1px solid; background: none; }
.sync-dot { font-size: 10px; display: flex; align-items: center; gap: 3px; margin-top: 3px; }
.progress-bar { background: #1e293b; border-radius: 99px; height: 8px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #4ade80); border-radius: 99px; transition: width 0.6s ease; }
.stats { display: flex; gap: 10px; margin-top: 14px; }
.stat-card { flex: 1; border-radius: 10px; padding: 8px; text-align: center; border: 1px solid; }
.upcoming { padding: 10px 16px 0; }
.alert-card { border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid; border-left: 3px solid; }
.tabs { display: flex; padding: 14px 16px 0; border-bottom: 1px solid #1e293b; overflow-x: auto; }
.tab { flex: 1; background: none; border: none; padding: 7px 0 9px; cursor: pointer; font-size: 12px; white-space: nowrap; min-width: 70px; }
.filters { display: flex; gap: 8px; padding: 14px 16px 0; flex-wrap: wrap; }
.filter-btn { border-radius: 99px; padding: 5px 12px; font-size: 12px; cursor: pointer; border: 1px solid; }
.events { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.event-card { border-radius: 12px; padding: 12px 12px; display: flex; align-items: flex-start; gap: 10px; border: 1px solid; border-left: 3px solid; }
.check-btn { width: 22px; height: 22px; min-width: 22px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; font-size: 11px; margin-top: 2px; }
.soon-badge { background: #1e3a5f; color: #93c5fd; font-size: 10px; padding: 2px 7px; border-radius: 99px; white-space: nowrap; }
.del-btn { background: none; border: none; color: #334155; cursor: pointer; font-size: 14px; padding: 2px 4px; }
.stat-section { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.stat-block { border-radius: 14px; padding: 14px; border: 1px solid; }
.add-wrap { padding: 8px 16px 30px; }
.form-box { background: #0a1628; border: 1px solid #1e3a5f; border-radius: 14px; padding: 16px; }
.form-input { width: 100%; background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; color: #e2e8f0; padding: 10px 12px; font-size: 13px; margin-bottom: 8px; font-family: inherit; }
.form-textarea { width: 100%; background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; color: #e2e8f0; padding: 10px 12px; font-size: 13px; margin-bottom: 8px; font-family: inherit; resize: none; min-height: 100px; }
/* Notes */
.notes-section { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.note-card { background: #0a1628; border: 1px solid #1e3a5f; border-left: 3px solid #a78bfa; border-radius: 12px; padding: 12px 14px; }
.note-date { font-size: 11px; color: #64748b; margin-bottom: 5px; }
.note-mood { font-size: 13px; margin-bottom: 4px; }
.note-text { font-size: 13px; color: #cbd5e1; line-height: 1.5; }
/* PIN */
.pin-overlay { position: fixed; inset: 0; background: rgba(7,13,20,0.97); display: flex; align-items: center; justify-content: center; z-index: 100; }
.pin-box { background: #0a1628; border: 1px solid #1e3a5f; border-radius: 20px; padding: 30px 26px; width: 260px; text-align: center; }
.pin-box.shake { animation: shake 0.5s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
.pin-dots { display: flex; justify-content: center; gap: 12px; margin: 20px 0 24px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; transition: all 0.15s; }
.pin-keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.pin-key { border: 1px solid #1e293b; border-radius: 12px; font-size: 20px; font-weight: bold; padding: 13px 0; cursor: pointer; background: #0f2027; color: #e2e8f0; }
.pin-key.del { background: #0f172a; color: #94a3b8; font-size: 18px; }
.loading { min-height: 100vh; background: #070d14; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
</style>
</head>
<body>
<div id="app">
  <div class="loading"><span style="font-size:48px">🐾</span><div style="color:#64748b;font-size:14px;letter-spacing:2px">ЗАГРУЗКА…</div></div>
</div>
<script>
const FIREBASE_URL = "https://cat-health-salem-default-rtdb.firebaseio.com";
const PIN = '1995';
const TYPES = {
  vaccine:  { label:'Вакцинация', icon:'💉', color:'#4ade80', bg:'#052e16' },
  vet:      { label:'Ветеринар',  icon:'🩺', color:'#60a5fa', bg:'#0c1a2e' },
  medicine: { label:'Лекарство',  icon:'💊', color:'#f472b6', bg:'#2d0a1e' },
};
const MOODS = ['😊','😐','😟','😰','💪','😴'];

let events = [];
let notes = [];
let canEdit = false;
let filter = 'all';
let activeTab = 'timeline';
let showForm = false;
let showNoteForm = false;
let formType = 'vaccine';
let showPin = false;
let pinValue = '';
let pinShake = false;
let syncStatus = 'ok';
let noteMood = '😊';

async function fbGet(path) {
  try { const r = await fetch(FIREBASE_URL + path + '.json'); const d = await r.json(); return d; } catch { return null; }
}
async function fbSet(path, data) {
  syncStatus='saving'; updateSync();
  try {
    await fetch(FIREBASE_URL + path + '.json', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
    syncStatus='ok';
  } catch { syncStatus='error'; }
  updateSync();
}
function updateSync() {
  const el = document.getElementById('syncdot');
  if (!el) return;
  const map = { ok:['#4ade80','Синхр.'], saving:['#60a5fa','Сохранение…'], error:['#f87171','Ошибка'] };
  const [c,t] = map[syncStatus];
  el.style.color = c;
  el.innerHTML = `<span style="font-size:7px">●</span> ${t}`;
}

function fmt(d) { return new Date(d).toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtFull(d) { return new Date(d).toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function upcoming(d) { return new Date(d) >= new Date(); }
function daysUntil(d) { return Math.ceil((new Date(d)-new Date())/86400000); }

function render() {
  const app = document.getElementById('app');
  const done = events.filter(e=>e.done).length;
  const total = events.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const upList = events.filter(e=>!e.done&&upcoming(e.date)).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const filtered = events.filter(e=>filter==='all'||e.type===filter).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const sortedNotes = [...notes].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const countDone = t => events.filter(e=>e.type===t&&e.done).length;
  const syncMap = { ok:['#4ade80','Синхр.'], saving:['#60a5fa','Сохранение…'], error:['#f87171','Ошибка'] };
  const [sc,st] = syncMap[syncStatus];

  let html = '';

  // PIN overlay
  if (showPin) {
    const dots = [0,1,2,3].map(i=>`<div class="pin-dot" style="background:${i<pinValue.length?'#60a5fa':'transparent'};border:2px solid ${i<pinValue.length?'#60a5fa':'#334155'}"></div>`).join('');
    const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
    html += `<div class="pin-overlay"><div class="pin-box${pinShake?' shake':''}">
      <div style="font-size:30px;margin-bottom:6px">🔒</div>
      <div style="font-size:15px;font-weight:bold;color:#f0f9ff;margin-bottom:3px">Режим редактирования</div>
      <div style="font-size:12px;color:#64748b">Введите PIN-код</div>
      <div class="pin-dots">${dots}</div>
      <div class="pin-keys">${keys.map((k,i)=>k===''?'<div></div>':`<button class="pin-key${k==='⌫'?' del':''}" onclick="pinPress('${k}')">${k}</button>`).join('')}</div>
      <button onclick="closePin()" style="margin-top:16px;background:none;border:none;color:#475569;font-size:13px;cursor:pointer">Отмена</button>
    </div></div>`;
  }

  // Header
  html += `<div class="header"><div class="header-glow"></div>
    <div class="header-top">
      <span style="font-size:32px">🐾</span>
      <div style="flex:1"><div class="header-title">Здоровье кота</div><div class="header-sub">Медицинский журнал</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end">
        <button class="edit-btn" onclick="toggleEdit()" style="border-color:${canEdit?'#4ade80':'#334155'};color:${canEdit?'#4ade80':'#64748b'};background:${canEdit?'#052e16':'#0f172a'}">${canEdit?'✏️ Редакт.':'🔒 Просмотр'}</button>
        <div class="sync-dot" id="syncdot" style="color:${sc}"><span style="font-size:7px">●</span> ${st}</div>
      </div>
    </div>
    <div style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12px;color:#94a3b8">Выполнено мероприятий</span><span style="font-size:12px;color:#60a5fa;font-weight:bold">${done} / ${total}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="stats">${Object.entries(TYPES).map(([k,t])=>`<div class="stat-card" style="background:${t.bg};border-color:${t.color}22"><div style="font-size:16px">${t.icon}</div><div style="font-size:15px;font-weight:bold;color:${t.color}">${countDone(k)}</div><div style="font-size:10px;color:#64748b">${t.label.toLowerCase()}</div></div>`).join('')}</div>
  </div>`;

  // Upcoming alerts
  if (upList.length > 0) {
    html += `<div class="upcoming">${upList.slice(0,2).map(e=>{
      const t=TYPES[e.type]; const days=daysUntil(e.date); const urgent=days<=7;
      return `<div class="alert-card" style="background:${t.bg};border-color:${t.color}44;border-left-color:${t.color}">
        <span style="font-size:18px">${t.icon}</span>
        <div style="flex:1"><div style="font-size:13px;font-weight:bold;color:#f0f9ff">${e.name}</div><div style="font-size:11px;color:#94a3b8">${fmt(e.date)}</div></div>
        <div style="background:${urgent?'#7f1d1d':'#1e3a5f'};color:${urgent?'#fca5a5':'#93c5fd'};font-size:11px;font-weight:bold;padding:3px 8px;border-radius:99px">${days===0?'Сегодня':days<0?'Просрочено':'через '+days+'д'}</div>
      </div>`;
    }).join('')}</div>`;
  }

  // Tabs
  html += `<div class="tabs">
    ${[['timeline','📋 События'],['stats','📊 Статистика'],['notes','📝 Заметки']].map(([tab,label])=>`
    <button class="tab" onclick="setTab('${tab}')" style="border-bottom:${activeTab===tab?'2px solid #60a5fa':'2px solid transparent'};color:${activeTab===tab?'#60a5fa':'#64748b'}">${label}</button>`).join('')}
  </div>`;

  // ── Timeline ──
  if (activeTab === 'timeline') {
    const filterOpts=[['all','Все','⭐'],...Object.entries(TYPES).map(([k,v])=>[k,v.label,v.icon])];
    html += `<div class="filters">${filterOpts.map(([k,l,i])=>`<button class="filter-btn" onclick="setFilter('${k}')" style="background:${filter===k?'#1e3a5f':'#0f172a'};border-color:${filter===k?'#3b82f6':'#1e293b'};color:${filter===k?'#60a5fa':'#64748b'}">${i} ${l}</button>`).join('')}</div>`;
    html += `<div class="events">${filtered.map(e=>{
      const t=TYPES[e.type]; const up=!e.done&&upcoming(e.date); const days=daysUntil(e.date);
      return `<div class="event-card" style="background:${e.done?'#0a1628':t.bg};border-color:${e.done?'#1e293b':t.color+'44'};border-left-color:${e.done?'#334155':t.color};opacity:${e.done?0.85:1}">
        <button class="check-btn" onclick="${canEdit?`toggleDone('${e.id}')`:''}" style="background:${e.done?'#4ade80':'transparent'};border-color:${e.done?'#4ade80':'#334155'};color:#070d14;cursor:${canEdit?'pointer':'default'};opacity:${canEdit?1:0.45}">${e.done?'✓':''}</button>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span>${t.icon}</span><span style="font-size:14px;font-weight:bold;color:${e.done?'#94a3b8':'#f0f9ff'};text-decoration:${e.done?'line-through':'none'}">${e.name}</span></div>
          <div style="font-size:11px;color:#64748b">${fmt(e.date)}${e.note?`<span style="margin-left:6px;color:#475569">· ${e.note}</span>`:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${up?`<span class="soon-badge">${days===0?'Сегодня':'через '+days+'д'}</span>`:''}
          ${canEdit?`<button class="del-btn" onclick="removeEvent('${e.id}')">✕</button>`:''}
        </div>
      </div>`;
    }).join('')}</div>`;

    html += `<div class="add-wrap">`;
    if (!canEdit) {
      html += `<button onclick="toggleEdit()" style="width:100%;background:#0a1628;border:1px dashed #1e293b;border-radius:12px;color:#334155;padding:14px;font-size:12px;cursor:pointer;letter-spacing:1px">🔒 Войти для редактирования</button>`;
    } else if (!showForm) {
      html += `<button onclick="openForm()" style="width:100%;background:linear-gradient(135deg,#1e3a5f,#0f2027);border:1px dashed rgba(59,130,246,0.27);border-radius:12px;color:#60a5fa;padding:14px;font-size:14px;cursor:pointer">+ Добавить событие</button>`;
    } else {
      html += `<div class="form-box">
        <div style="font-size:14px;font-weight:bold;color:#f0f9ff;margin-bottom:12px">Новое событие</div>
        <div style="display:flex;gap:8px;margin-bottom:12px">${Object.entries(TYPES).map(([k,t])=>`<button onclick="setFormType('${k}')" style="flex:1;background:${formType===k?t.bg:'#0f172a'};border:1px solid ${formType===k?t.color:'#1e293b'};border-radius:8px;color:${formType===k?t.color:'#64748b'};padding:8px 4px;font-size:11px;cursor:pointer">${t.icon} ${t.label}</button>`).join('')}</div>
        <input class="form-input" id="fname" placeholder="Название"/>
        <input class="form-input" id="fdate" type="date"/>
        <input class="form-input" id="fnote" placeholder="Заметка (необязательно)"/>
        <div style="display:flex;gap:8px">
          <button onclick="addEvent()" style="flex:2;background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:8px;color:#fff;padding:11px;font-size:13px;cursor:pointer">Добавить</button>
          <button onclick="closeForm()" style="flex:1;background:#0f172a;border:1px solid #1e293b;border-radius:8px;color:#64748b;padding:11px;font-size:13px;cursor:pointer">Отмена</button>
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  // ── Stats ──
  if (activeTab === 'stats') {
    html += `<div class="stat-section">${Object.entries(TYPES).map(([key,t])=>{
      const te=events.filter(e=>e.type===key); const td=te.filter(e=>e.done).length; const p=te.length?Math.round(td/te.length*100):0;
      return `<div class="stat-block" style="background:${t.bg};border-color:${t.color}33">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <span style="font-size:22px">${t.icon}</span>
          <div style="flex:1"><div style="font-size:15px;font-weight:bold;color:#f0f9ff">${t.label}</div><div style="font-size:12px;color:#64748b">${td} из ${te.length} выполнено</div></div>
          <div style="font-size:20px;font-weight:bold;color:${t.color}">${p}%</div>
        </div>
        <div style="background:#0f172a;border-radius:99px;height:6px;margin-bottom:10px"><div style="width:${p}%;height:100%;background:${t.color};border-radius:99px;transition:width 0.6s"></div></div>
        ${te.map(e=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:${e.done?'#64748b':'#94a3b8'};margin-bottom:4px">
          <span style="color:${e.done?'#4ade80':'#334155'};font-size:10px">${e.done?'●':'○'}</span>
          <span style="text-decoration:${e.done?'line-through':'none'}">${e.name}</span>
          <span style="margin-left:auto;color:#475569">${fmt(e.date)}</span>
        </div>`).join('')}
      </div>`;
    }).join('')}</div>`;
  }

  // ── Notes ──
  if (activeTab === 'notes') {
    html += `<div class="notes-section">`;

    if (canEdit) {
      if (!showNoteForm) {
        html += `<button onclick="openNoteForm()" style="width:100%;background:linear-gradient(135deg,#1a1040,#0f0a28);border:1px dashed rgba(167,139,250,0.3);border-radius:12px;color:#a78bfa;padding:14px;font-size:14px;cursor:pointer">+ Добавить заметку</button>`;
      } else {
        html += `<div class="form-box" style="border-color:#a78bfa44">
          <div style="font-size:14px;font-weight:bold;color:#f0f9ff;margin-bottom:12px">📝 Новая заметка</div>
          <div style="margin-bottom:10px">
            <div style="font-size:12px;color:#64748b;margin-bottom:6px">Самочувствие кота:</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">${MOODS.map(m=>`<button onclick="setMood('${m}')" style="font-size:20px;background:${noteMood===m?'#1e1040':'#0f172a'};border:2px solid ${noteMood===m?'#a78bfa':'#1e293b'};border-radius:8px;padding:6px 10px;cursor:pointer">${m}</button>`).join('')}</div>
          </div>
          <textarea class="form-textarea" id="fnotetext" placeholder="Опиши как себя чувствует Салем, что изменилось, какие симптомы..."></textarea>
          <div style="display:flex;gap:8px">
            <button onclick="addNote()" style="flex:2;background:linear-gradient(135deg,#4c1d95,#6d28d9);border:none;border-radius:8px;color:#fff;padding:11px;font-size:13px;cursor:pointer">Сохранить</button>
            <button onclick="closeNoteForm()" style="flex:1;background:#0f172a;border:1px solid #1e293b;border-radius:8px;color:#64748b;padding:11px;font-size:13px;cursor:pointer">Отмена</button>
          </div>
        </div>`;
      }
    } else {
      html += `<button onclick="toggleEdit()" style="width:100%;background:#0a1628;border:1px dashed #1e293b;border-radius:12px;color:#334155;padding:14px;font-size:12px;cursor:pointer;letter-spacing:1px">🔒 Войти для добавления заметок</button>`;
    }

    if (sortedNotes.length === 0) {
      html += `<div style="text-align:center;padding:30px 0;color:#334155;font-size:13px">Заметок пока нет</div>`;
    } else {
      html += sortedNotes.map(n=>`
        <div class="note-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div class="note-date">${fmtFull(n.date)}</div>
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:20px">${n.mood||'😊'}</span>
              ${canEdit?`<button class="del-btn" onclick="removeNote('${n.id}')">✕</button>`:''}
            </div>
          </div>
          <div class="note-text">${n.text.replace(/\n/g,'<br>')}</div>
        </div>`).join('');
    }

    html += `</div>`;
  }

  app.innerHTML = html;
}

// Actions
function toggleEdit() { if (canEdit) { canEdit=false; showForm=false; showNoteForm=false; render(); } else { showPin=true; pinValue=''; render(); } }
function closePin() { showPin=false; render(); }
function pinPress(k) {
  if (k==='⌫') { pinValue=pinValue.slice(0,-1); render(); return; }
  if (pinValue.length>=4) return;
  pinValue+=k; render();
  if (pinValue.length===4) {
    if (pinValue===PIN) { showPin=false; canEdit=true; pinValue=''; render(); }
    else { pinShake=true; render(); setTimeout(()=>{ pinValue=''; pinShake=false; render(); },600); }
  }
}
function setTab(t) { activeTab=t; showForm=false; showNoteForm=false; render(); }
function setFilter(f) { filter=f; render(); }
function openForm() { showForm=true; render(); }
function closeForm() { showForm=false; render(); }
function setFormType(t) { formType=t; render(); }
function openNoteForm() { showNoteForm=true; render(); }
function closeNoteForm() { showNoteForm=false; render(); }
function setMood(m) { noteMood=m; render(); }

function addEvent() {
  const name=document.getElementById('fname').value.trim();
  const date=document.getElementById('fdate').value;
  const note=document.getElementById('fnote').value.trim();
  if (!name||!date) return;
  events.push({ id:Date.now().toString(), type:formType, name, date, note, done:false });
  fbSet('/cat_events', events);
  showForm=false; render();
}
function toggleDone(id) {
  events=events.map(e=>e.id===id?{...e,done:!e.done}:e);
  fbSet('/cat_events', events); render();
}
function removeEvent(id) {
  events=events.filter(e=>e.id!==id);
  fbSet('/cat_events', events); render();
}
function addNote() {
  const text=document.getElementById('fnotetext').value.trim();
  if (!text) return;
  notes.push({ id:Date.now().toString(), date:new Date().toISOString(), mood:noteMood, text });
  fbSet('/cat_notes', notes);
  showNoteForm=false; noteMood='😊'; render();
}
function removeNote(id) {
  notes=notes.filter(n=>n.id!==id);
  fbSet('/cat_notes', notes); render();
}

// Telegram
if (window.Telegram&&window.Telegram.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

// Init
Promise.all([fbGet('/cat_events'), fbGet('/cat_notes')]).then(([ev, nt]) => {
  events = Array.isArray(ev) ? ev : [];
  notes  = Array.isArray(nt) ? nt : [];
  render();
});
</script>
</body>
</html>
